<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glamy - Réservation Nadia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Couleurs douces, univers beauté / nail art */
            --bg-page: #2a2626; /* Fond sombre légèrement texturé */
            --phone-bg: #fffbf9; /* Arrière-plan de l'écran (beige très clair) */
            --primary: #f2cdd0; /* Rose poudré */
            --primary-dark: #cc9b9e;
            --gold: #d4af37; /* Touches dorées */
            --client-msg-bg: #f2cdd0;
            --client-msg-text: #4a3b3c;
            --nadia-msg-bg: #faefe9;
            --nadia-msg-text: #4a3b3c;
            --text-dark: #333333;
            --text-light: #888888;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--phone-bg);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            overflow: hidden;
            overscroll-behavior-y: none; /* Empêche l'effet rebond sur iOS */
        }

        /* Conteneur principal plein écran */
        .phone {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            width: 100%;
            max-width: 500px; /* Optionnel : pour garder une largeur lisible sur ordinateur */
            margin: 0 auto;
            background-color: var(--phone-bg);
            /* Important pour forcer Flexbox à respecter la taille de l'écran */
            overflow: hidden;
            min-height: 0;
        }

        /* En-tête de la conversation */
        .header {
            text-align: center;
            padding: 10px 0 15px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            background-color: rgba(255, 251, 249, 0.95);
            backdrop-filter: blur(5px);
            z-index: 5;
        }

        .header h1 {
            margin: 0;
            font-size: 17px;
            font-weight: 600;
        }

        /* Zone de messagerie */
        .chat-container {
            flex: 1;
            /* Le fix magique Flexbox pour obliger la div à scroller sans s'agrandir à l'infini */
            min-height: 0;
            overflow-y: auto;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            /* Plus besoin de gros padding car l'input n'est plus en absolute */
            padding-bottom: 20px;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background-color: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
        }

        .chat-container:hover::-webkit-scrollbar-thumb {
            background-color: rgba(0, 0, 0, 0.15);
        }

        /* Animation des messages */
        .message-wrapper {
            display: flex;
            flex-direction: column;
            animation: slideUpFade 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(15px);
        }

        @keyframes slideUpFade {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            margin-bottom: 4px;
        }

        .message-row.nadia { justify-content: flex-start; }
        .message-row.client { justify-content: flex-end; }

        /* Avatar de l'IA */
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: var(--gold);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            font-size: 14px;
            flex-shrink: 0;
        }

        /* Bulle de message */
        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.nadia {
            background-color: var(--nadia-msg-bg);
            color: var(--nadia-msg-text);
            border-bottom-left-radius: 5px;
            white-space: pre-wrap;
        }

        .message.client {
            background-color: var(--client-msg-bg);
            color: var(--client-msg-text);
            border-bottom-right-radius: 5px;
        }

        /* Boutons de propositions (prestations, créneaux) */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-left: 42px; /* alignement avec le texte de Nadia */
            margin-top: 4px;
        }

        .option-button {
            background-color: transparent;
            border: 1px solid var(--primary-dark);
            color: var(--primary-dark);
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            font-family: inherit;
            width: fit-content;
            max-width: 85%;
        }

        .option-button:hover {
            background-color: var(--primary-dark);
            color: white;
        }
        
        .option-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Indicateur que l'IA écrit... */
        .typing-indicator {
            padding: 12px 16px;
            background-color: var(--nadia-msg-bg);
            border-radius: 20px;
            border-bottom-left-radius: 5px;
            display: flex;
            align-items: center;
            gap: 4px;
            width: fit-content;
        }

        .dot {
            width: 6px;
            height: 6px;
            background-color: var(--text-light);
            border-radius: 50%;
            animation: dotBounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .typing-wrapper { display: none; }
        .typing-wrapper.active { display: flex; }

        /* Zone de saisie (toujours visible) */
        .input-area {
            flex-shrink: 0;
            padding: 12px 15px;
            background-color: var(--phone-bg);
            border-top: 1px solid rgba(0,0,0,0.05);
            display: flex;
            gap: 10px;
            align-items: center;
            padding-bottom: calc(12px + env(safe-area-inset-bottom)); /* Support safe area mobile */
            z-index: 10;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 24px;
            border: 1px solid #e0e0e0;
            background-color: white;
            font-size: 15px;
            outline: none;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .input-area input:focus {
            border-color: var(--primary-dark);
        }

        .input-area button {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background-color: var(--primary-dark);
            color: white;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            padding: 0;
            transition: transform 0.1s;
        }
        
        .input-area button:active {
            transform: scale(0.95);
        }

        .input-area button svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            margin-left: 2px;
        }

        /* Bouton final "Voir mes rendez-vous" */
        .final-action-area {
            flex-shrink: 0;
            padding: 20px 15px;
            background-color: var(--phone-bg);
            border-top: 1px solid rgba(0,0,0,0.05);
            display: none; /* Caché par défaut */
            justify-content: center;
            align-items: center;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
            z-index: 11;
        }

        .view-appointments-btn {
            background-color: var(--primary-dark);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 28px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 80%;
            box-shadow: 0 4px 12px rgba(242, 205, 208, 0.4);
            transition: transform 0.2s;
        }

        .view-appointments-btn:active {
            transform: scale(0.98);
        }

        /* Formulaire de paiement factice */
        .payment-form {
            background: white;
            border: 1px solid #eee;
            border-radius: 16px;
            padding: 15px;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .payment-form input {
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .payment-form input:focus {
            border-color: var(--primary-dark);
        }

        .payment-form .row {
            display: flex;
            gap: 10px;
        }

        .payment-form .row input {
            width: 50%;
        }

        .payment-form button {
            background-color: var(--primary-dark);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .payment-form button:hover {
            background-color: #dfb2b6;
        }
    </style>
</head>
<body>

        <div class="phone">
            <div class="header">
                <h1>Nadia 💅</h1>
            </div>

            <div class="chat-container" id="chat-container">
                <!-- Les messages s'afficheront ici -->
                
                <!-- Indicateur de frappe Nadia -->
                <div class="message-wrapper typing-wrapper" id="typing-wrapper">
                    <div class="message-row nadia">
                        <div class="avatar">N</div>
                        <div class="typing-indicator">
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="input-area" id="input-area">
                <input type="text" id="user-input" placeholder="Écrire un message..." onkeypress="handleKeyPress(event)">
                <button onclick="doSendButton()">
                    <svg viewBox="0 0 24 24"><path d="M2,21L23,12L2,3V10L17,12L2,14V21Z" /></svg>
                </button>
            </div>

            <div class="final-action-area" id="final-action-area">
                <button class="view-appointments-btn" onclick="alert('Redirection vers mes rendez-vous...')">
                    Voir mes rendez-vous
                </button>
            </div>
        </div>

    <script>
        // Redirection vers Instagram au rafraîchissement (pour le prototype)
        if (performance.navigation.type === 1) {
            window.location.href = 'index.html';
        }

        const API_KEY = "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";
        // Le modèle requis dans le prompt est "deepseek/deepseek-v3-2". 
        // Par précaution, nous utilisons "deepseek/deepseek-chat" qui est la version stable de v3 sur OpenRouter.
        const MODEL = "deepseek/deepseek-chat"; 

        const SYSTEM_PROMPT = `Tu es Nadia, une nail artist professionnelle basée en France.
Tu parles au nom de Nadia et la cliente ne sait pas qu'elle parle à une IA.
Tu es chaleureuse, professionnelle et tu utilises des emojis avec parcimonie 💅.
IMPORTANT : Tu dois impérativement tutoyer la cliente ("tu", "toi", etc.). Ne jamais utiliser "vous".

Tarifs des prestations :
- Pose gel (1h) : 60€
- Remplissage (45min) : 45€
- Nail art (1h30) : 80€

Ton rôle est de guider la cliente pour réserver un rendez-vous en suivant ces étapes dans l'ordre :
1. DÈS LE DÉBUT : Accueille la cliente avec chaleur. Utilise exactement cette accroche : "Coucou ! Je suis Nadia, ta prothésiste préférée ✨. Je peux t'accueillir à mon studio situé au 14 rue de la Paix, 75002 Paris. Voici les prestations que je te propose :". Propose les 3 prestations avec leurs prix. Utilise le type "prestations".
2. Quand elle choisit une prestation, propose-lui des créneaux disponibles (6 créneaux fictifs). Utilise le type "creneaux".
3. Demande son prénom.
4. Demande son numéro de téléphone de manière douce et délicate (ex: "Peux-tu me laisser ton numéro pour que je t'envoie un petit rappel par SMS ? 📱"). Ne sois pas trop directe.
5. Propose le paiement de l'avance (Carte bancaire ou PayPal) avec boutons. Explique qu'une avance est nécessaire pour bloquer le créneau. Utilise le type "paiement".
6. IMPORTANT : Calcule 30% du montant de la prestation choisie. Que la cliente choisisse "Carte bancaire" OU "PayPal", tu dois pareillement lui demander de saisir ses numéros de carte pour l'avance de 30% (soit XX€). Pour cela, utilise systématiquement le type "paiement_form".
7. Une fois que la cliente a validé le formulaire, confirme le RDV avec un récapitulatif complet.
8. POUR LE DERNIER MESSAGE DE CONFIRMATION : Tu dois impérativement préciser que l'avance payée n'est pas remboursable et que le montant restant (XX€) sera prélevé automatiquement juste après ta prestation. Utilise le type "confirmation" pour que l'interface puisse afficher le bouton final.

Structures JSON :
- Prestations : {"type": "prestations", "message": "...", "options": ["Pose gel - 60€", "Remplissage - 45€", "Nail art - 80€"]}
- Créneaux : {"type": "creneaux", "message": "...", "options": [...]}
- Paiement : {"type": "paiement", "message": "...", "options": ["Carte bancaire", "PayPal"]}
- Formulaire de paiement : {"type": "paiement_form", "message": "Génial ! Pour valider la réservation, je te laisse saisir tes infos ici pour le paiement de l'avance de 30% (soit [Montant_Avance]€) :"}
- Texte simple : {"type": "texte", "message": "..."}
- Confirmation finale : {"type": "confirmation", "message": "C'est parfait [Prénom] ! Ton rendez-vous pour [prestation] est confirmé pour [jour] à [heure]. ✨\\n\\nNote bien que l'avance de [Montant_Avance]€ n'est pas remboursable. Le reste à charge ([Montant_Restant]€) sera prélevé automatiquement juste après ta prestation. Merci de ta confiance et à très vite ! 💅"}

Réponds TOUJOURS en JSON valide. Ton output entier doit être un objet JSON unique.
Tu parles uniquement en français.`;

        // Historique de la conversation
        let conversationHistory = [
            { role: "system", content: SYSTEM_PROMPT },
            // On ajoute un message de l'utilisateur caché pour déclencher la première réponse de l'IA dès le début 
            { role: "user", content: "Bonjour, j'aimerais prendre un rendez-vous." }
        ];

        const chatContainer = document.getElementById('chat-container');
        const typingWrapper = document.getElementById('typing-wrapper');
        const userInput = document.getElementById('user-input');
        const inputArea = document.getElementById('input-area');
        const finalActionArea = document.getElementById('final-action-area');

        function scrollToBottom() {
            setTimeout(() => {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }, 50);
        }

        function setTyping(isTyping) {
            if (isTyping) {
                chatContainer.appendChild(typingWrapper);
                typingWrapper.classList.add('active');
                scrollToBottom();
            } else {
                typingWrapper.classList.remove('active');
            }
        }

        function addClientMessage(text) {
            const div = document.createElement('div');
            div.className = 'message-wrapper';
            div.innerHTML = `
                <div class="message-row client">
                    <div class="message client">${text}</div>
                </div>
            `;
            chatContainer.insertBefore(div, typingWrapper);
            scrollToBottom();
        }

        function addNadiaMessage(text, options = [], isPaymentForm = false) {
            const div = document.createElement('div');
            div.className = 'message-wrapper';

            let extraHtml = '';
            if (options && options.length > 0) {
                extraHtml = '<div class="options-container">';
                options.forEach(opt => {
                    const safeOpt = opt.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                    extraHtml += `<button class="option-button" onclick="handleOption(this, '${safeOpt}')">${opt}</button>`;
                });
                extraHtml += '</div>';
            } else if (isPaymentForm) {
                extraHtml = `
                    <div class="options-container">
                        <div class="payment-form">
                            <input type="text" placeholder="Numéro de carte" maxlength="19">
                            <div class="row">
                                <input type="text" placeholder="MM/AA" maxlength="5">
                                <input type="text" placeholder="CVV" maxlength="3">
                            </div>
                            <button onclick="submitPayment(this)">Valider le paiement</button>
                        </div>
                    </div>
                `;
            }

            div.innerHTML = `
                <div class="message-row nadia">
                    <div class="avatar">N</div>
                    <div class="message nadia">${text}</div>
                </div>
                ${extraHtml}
            `;
            chatContainer.insertBefore(div, typingWrapper);
            scrollToBottom();
        }

        function submitPayment(btn) {
            const form = btn.parentElement;
            const inputs = form.querySelectorAll('input');
            let allFilled = true;
            inputs.forEach(i => { if(!i.value) allFilled = false; });
            
            if(!allFilled) {
                alert("Petit oubli ? Il manque des infos sur ta carte 💅");
                return;
            }

            inputs.forEach(i => i.disabled = true);
            btn.disabled = true;
            btn.style.backgroundColor = "#4CAF50";
            btn.innerText = "Paiement validé ✓";
            
            // Simuler l'envoi du message "paiement fait"
            setTimeout(() => {
                sendUserMessage("C'est fait, j'ai rentré mes numéros !");
            }, 500);
        }

        function handleOption(buttonEl, text) {
            // Désactiver tous les boutons d'options affichés pour éviter le double-clic
            const allBtn = document.querySelectorAll('.option-button:not([disabled])');
            allBtn.forEach(b => b.setAttribute('disabled', 'true'));
            
            sendUserMessage(text);
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                const text = userInput.value.trim();
                if (text) sendUserMessage(text);
            }
        }

        function doSendButton() {
            const text = userInput.value.trim();
            if (text) sendUserMessage(text);
        }

        async function sendUserMessage(text) {
            // Afficher le message localement
            addClientMessage(text);
            
            // L'ajouter à l'historique pour l'API
            conversationHistory.push({ role: "user", content: text });
            
            // Vider la barre de saisie
            userInput.value = '';
            
            // Appeler l'API
            await fetchAiResponse();
        }

        async function fetchAiResponse() {
            setTyping(true);
            
            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer " + API_KEY,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: conversationHistory,
                        response_format: { type: "json_object" }
                    })
                });

                if (!response.ok) {
                    throw new Error("HTTP " + response.status);
                }

                const data = await response.json();
                let aiText = data.choices[0].message.content;
                
                // Nettoyage au cas où l'IA inclut des balises markdown ```json ... ```
                aiText = aiText.replace(/```json/g, '').replace(/```/g, '').trim();

                conversationHistory.push({ role: "assistant", content: aiText });
                
                let parsed = null;
                try {
                    parsed = JSON.parse(aiText);
                } catch (e) {
                    console.error("Erreur de parsing JSON de l'IA:", aiText);
                    // Fallback en texte brut si l'IA oublie le format JSON
                    parsed = { type: "texte", message: aiText };
                }

                setTyping(false);
                
                if (parsed.type === 'confirmation') {
                    // Cacher l'input et afficher le bouton de rendez-vous
                    inputArea.style.display = 'none';
                    finalActionArea.style.display = 'flex';
                    scrollToBottom(); // Re-scroller après le changement de layout
                }

                if (parsed.type === 'paiement_form') {
                    addNadiaMessage(parsed.message, [], true);
                } else if (parsed.options && parsed.options.length > 0) {
                    addNadiaMessage(parsed.message, parsed.options);
                } else {
                    addNadiaMessage(parsed.message || (typeof parsed === 'string' ? parsed : aiText));
                }

            } catch (error) {
                console.error("Erreur de l'API OpenRouter :", error);
                setTyping(false);
                addNadiaMessage("Oops, j'ai eu un petit problème de réseau. Peux-tu réessayer ? 💅");
            }
        }

        // Lancer la conversation au chargement
        window.addEventListener('load', () => {
             // L'initialisation de l'API se fait avec le message utilisateur caché
             fetchAiResponse();
        });
    </script>
</body>
</html>
